<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <div class="container">
        <div class="form-image">
            <img src="img/logocadastro.jpg" alt="Imagem do cadastro">
        </div>
        <div class="form">
            <form id="form-cadastro" action="#" method="post" novalidate>
                <div class="form-header">
                    <div class="title">
                       <h1>Cadastre-se</h1> 
                    </div> 
                    <div class="login-button">
                        <button type="button"><a href="entrar.html">Entrar</a></button>
                    </div>      
                </div>
                <p id="form-message" class="form-message" role="alert"></p>
                <div class="input-group">
                    <div class="input-box">
                        <label for="firstname">Primeiro nome</label>
                        <input id="firstname" type="text" name="firstname" placeholder="Digite seu primeiro nome" required maxlength="80" autocomplete="given-name">
                    </div>

                    <div class="input-box">
                        <label for="lastname">Sobrenome</label>
                        <input id="lastname" type="text" name="lastname" placeholder="Digite seu sobrenome" required maxlength="80" autocomplete="family-name">
                    </div>

                    <div class="input-box">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" name="email" placeholder="Digite seu e-mail" required autocomplete="email">
                    </div>

                    <div class="input-box">
                        <label for="number">Celular</label>
                        <input id="number" type="tel" name="number" placeholder="(xx) xxxxx-xxxx" required maxlength="30" autocomplete="tel">
                    </div>

                    <div class="input-box">
                        <label for="password">Senha</label>
                        <input id="password" type="password" name="password" placeholder="Mínimo 8 caracteres, letras e números" required minlength="8" autocomplete="new-password">
                    </div>

                    <div class="input-box">
                        <label for="confirmPassword">Confirme a senha</label>
                        <input id="confirmPassword" type="password" name="confirmPassword" placeholder="Repita a senha" required minlength="8" autocomplete="new-password">
                    </div>
                </div>

                <div class="gender-inputs">
                   <div class="gender-title">
                     <h6>Gênero</h6>
                    </div> 

                    <div class="gender-group">
                        <div class="gender-input">
                            <input type="radio" id="female" name="gender" value="Feminino" required>
                            <label for="female">Feminino</label>
                        </div>

                           <div class="gender-input">
                            <input type="radio" id="male" name="gender" value="Masculino">
                            <label for="male">Masculino</label>
                        </div>

                           <div class="gender-input">
                            <input type="radio" id="others" name="gender" value="Outros">
                            <label for="others">Outros</label>
                        </div>

                           <div class="gender-input">
                            <input type="radio" id="none" name="gender" value="Prefiro não dizer">
                            <label for="none">Prefiro não dizer</label>
                        </div>
                    </div>
                </div>

                <div class="continue-button">
                    <button type="submit">Continuar</button>
                </div>
            </form>
        </div>

    </div>
    <script src="js/auth.js"></script>
    <script src="js/cadastro.js"></script>
</body>
</html>
